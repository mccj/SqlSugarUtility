# 本工作流用于在推送或拉取请求时构建 .NET 项目。
# 说明文档：https://docs.github.com/zh/actions/automating-builds-and-tests/building-and-testing-net

name: .NET 构建

# 在推送到 main 或针对 main 的 PR 时触发
on:
  push:
    branches: [ "main" ]
  pull_request:

# 构建过程中可用的环境变量（供后续步骤或脚本使用）
env:
  SHA: ${{ github.sha }}
  REF: ${{ github.ref }}
  RUN_ID: ${{ github.run_id }}
  RUN_NUMBER: ${{ github.run_number }}
  BUILD_RUN_NUMBER: build.${{ github.run_number }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
  # 根目录无 .sln；从引用主库的扩展项目还原/构建即可连带构建 SqlSugarUtility
  MAIN_PROJECT: src/

jobs:
  # job 的键名须为 ASCII；中文显示名通过 name 指定
  build:
    name: 构建
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: 安装 .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: 查看 .NET 环境信息
      run: dotnet --info
    - name: 还原依赖
      run: dotnet restore "${{ env.MAIN_PROJECT }}"
    - name: 编译
      run: dotnet build "${{ env.MAIN_PROJECT }}" --configuration Release --no-restore
