# 本工作流用于在推送或拉取请求时构建 .NET 项目。
# 说明文档：https://docs.github.com/zh/actions/automating-builds-and-tests/building-and-testing-net

name: .NET 构建

# 在推送到 main 或针对 main 的 PR 时触发
on:
  push:
    branches: [ "main" ]
  pull_request:

# 构建过程中可用的环境变量（供后续步骤或脚本使用）
env:
  SHA: ${{ GITHUB.SHA }}
  REF: ${{ GITHUB.REF }}
  RUN_ID: ${{ GITHUB.RUN_ID }}
  RUN_NUMBER: ${{ GITHUB.RUN_NUMBER }}
  BUILD_RUN_NUMBER: build.${{ GITHUB.RUN_NUMBER }}
  GITHUB_TOKEN: ${{ SECRETS.GITHUB_TOKEN }}
  COVERALLS_REPO_TOKEN: ${{ SECRETS.COVERALLS_REPO_TOKEN }}

jobs:
  # job 的键名须为 ASCII；中文显示名通过 name 指定
  build:
    name: 构建
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: 安装 .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: 查看 .NET 环境信息
      run: dotnet --info
    - name: 还原依赖
      run: dotnet restore
    - name: 编译
      run: dotnet build --no-restore
